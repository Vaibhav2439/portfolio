<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaibhav Dhere | Portfolio</title>
    
    <style>
      /* Set default dark background immediately */
      html, body, #root {
        background-color: #111827;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
    </style>
    
    <script>
      // Apply dark class immediately
      document.documentElement.classList.add('dark');
      
      // Then check saved preference and update if needed
      const saved = localStorage.getItem('darkMode');
      if (saved === 'false') {
        document.documentElement.classList.remove('dark');
        // Also update body background for light mode
        document.querySelector('html').style.backgroundColor = '#f9fafb';
      }
    </script>
  </body>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
